<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Pesquisadores</title>
  <link rel="stylesheet" href="style.css"> <!-- Certifique-se de apontar para seu CSS -->
</head>
<body>

  <div id="header"></div>

  <script>
    fetch("header.html")
      .then(response => response.text())
      .then(data => {
        document.getElementById("header").innerHTML = data;
      });
  </script>

  <main>
  <section id="pesquisadores">
    <div class="container">
      <h2>Recursos Humanos</h2>
      <table id="tabela-pesquisadores" border="1">
        <thead>
          <tr>
            <th>Nome</th>
            <th>Função</th>
            <th>Vínculo</th>
          </tr>
        </thead>
        <tbody>
          <!-- Os dados serão inseridos aqui -->
        </tbody>
      </table>
    </div>
  </section>

      <script>
      fetch('pesquisadores.csv')
        .then(response => response.text())
        .then(data => {
          const linhas = data.trim().split('\n');
          const corpoTabela = document.querySelector('#tabela-pesquisadores tbody');

          for (let i = 1; i < linhas.length; i++) {
            const colunas = linhas[i].split(',');
            const linhaHTML = `<tr><td>${colunas[0]}</td><td>${colunas[1]}</td><td>${colunas[2]}</td></tr>`;
            corpoTabela.innerHTML += linhaHTML;
          }
        });
      </script>

  </main>
   
<button id="btnTopo" title="Voltar ao topo">↑</button>
<script>
  const btnTopo = document.getElementById("btnTopo");

  window.onscroll = function () {
    if (document.body.scrollTop > 100 || document.documentElement.scrollTop > 100) {
      btnTopo.style.display = "block";
    } else {
      btnTopo.style.display = "none";
    }
  };

  btnTopo.addEventListener("click", function () {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
</script>


  <div id="footer"></div>
  <script>
    fetch("footer.html")
      .then(response => response.text())
      .then(data => {
        document.getElementById("footer").innerHTML = data;
      });
  </script>

</body>
</html>
